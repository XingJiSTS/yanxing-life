<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Keplerian Saturn - Gesture Control</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #container { width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; 
               padding: 8px 16px; border-radius: 20px; cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s; }
        .btn:hover { background: rgba(255,255,255,0.3); }
        #video-preview { position: absolute; bottom: 20px; left: 20px; width: 160px; height: 120px; 
                         border-radius: 12px; border: 2px solid #555; transform: scaleX(-1); }
        #status { position: absolute; bottom: 20px; right: 20px; color: rgba(255,255,255,0.5); font-size: 12px; }
    </style>
</head>
<body>
<div id="ui-layer">
    <button class="btn" onclick="toggleFullScreen()">Fullscreen</button>
</div>
<video id="video-preview" autoplay playsinline></video>
<div id="status">MediaPipe Initializing...</div>
<div id="container"></div>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script id="vertexShader" type="x-shader/x-vertex">
    uniform float uTime;
    uniform float uScale; // 手势缩放值 0.5 - 5.0
    uniform float uChaos; // 混沌阈值系数
    attribute float aSize;
    attribute float aDistance;
    attribute float aSpeed;
    attribute vec3 aRandom;
    varying vec3 vColor;
    varying float vAlpha;
    // 伪随机噪声函数
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
    vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
    float snoise(vec3 v) {
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i  = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min( g.xyz, l.zxy );
        vec3 i2 = max( g.xyz, l.zxy );
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute( permute( permute( i.z + vec4(0.0, i1.z, i2.z, 1.0 )) + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
        float n_ = 0.142857142857;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_ );
        vec4 x = x_ *ns.x + ns.yyyy;
        vec4 y = y_ *ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4( x.xy, y.xy );
        vec4 b1 = vec4( x.zw, y.zw );
        vec4 s0 = floor(b0)*2.0 + 1.0;
        vec4 s1 = floor(b1)*2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
        vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
        vec3 p0 = vec3(a0.xy,h.x);
        vec3 p1 = vec3(a0.zw,h.y);
        vec3 p2 = vec3(a1.xy,h.z);
        vec3 p3 = vec3(a1.zw,h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
    }
    void main() {
        // 开普勒物理运动: 轨道速度与距离的平方根成反比
        float angle = uTime * aSpeed * (1.0 / sqrt(aDistance));
        vec3 pos = vec3(cos(angle) * aDistance, 0.0, sin(angle) * aDistance);
        // 核心球体判定 (如果距离很小，则呈球状分布)
        if(aDistance < 2.0) {
            pos = aRandom * 1.5;
        }
        // 应用手势缩放
        pos *= uScale;
        // 混沌阶段：当uScale超过一定阈值，叠加高频噪点
        float chaosFactor = smoothstep(3.5, 5.0, uScale);
        vec3 noise = vec3(
            snoise(pos * 0.5 + uTime * 2.0),
            snoise(pos * 0.5 + uTime * 2.1),
            snoise(pos * 0.5 + uTime * 1.9)
        );
        pos += noise * chaosFactor * 5.0;
        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        // 物理光亮变化：靠近越亮，缩放越大整体越亮
        float brightness = uScale * 0.4;
        vColor = vec3(0.9, 0.8, 0.6) * (1.0 / (1.0 + aDistance * 0.1)) * brightness;
        vAlpha = clamp(1.2 - chaosFactor * 0.5, 0.1, 1.0);
        gl_Position = projectionMatrix * mvPosition;
        gl_PointSize = aSize * (300.0 / -mvPosition.z);
    }
</script>
<script id="fragmentShader" type="x-shader/x-fragment">
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
        float d = distance(gl_PointCoord, vec2(0.5));
        if(d > 0.5) discard;
        float strength = pow(1.0 - d*2.0, 2.0);
        gl_FragColor = vec4(vColor, strength * vAlpha);
    }
</script>
<script>
    let scene, camera, renderer, particles;
    let handScale = 1.0;
    const videoElement = document.getElementById('video-preview');
    const statusLabel = document.getElementById('status');
    function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;
        camera.position.y = 8;
        camera.lookAt(0,0,0);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('container').appendChild(renderer.domElement);
        const count = 150000; // 高密度粒子
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const sizes = new Float32Array(count);
        const distances = new Float32Array(count);
        const speeds = new Float32Array(count);
        const randoms = new Float32Array(count * 3);
        for(let i=0; i<count; i++) {
            // 土星环与核心分布
            let dist;
            if(Math.random() > 0.3) {
                dist = 4 + Math.random() * 6; // 环
            } else {
                dist = Math.random() * 2; // 核心
            }
            distances[i] = dist;
            speeds[i] = (Math.random() + 0.5) * 2.0;
            sizes[i] = Math.random() * 2.5 + 0.5;
            const r = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
            randoms[i*3] = r.x; randoms[i*3+1] = r.y; randoms[i*3+2] = r.z;
        }
        geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
        geometry.setAttribute('aDistance', new THREE.BufferAttribute(distances, 1));
        geometry.setAttribute('aSpeed', new THREE.BufferAttribute(speeds, 1));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uScale: { value: 1.0 },
            },
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        particles = new THREE.Points(geometry, material);
        scene.add(particles);
    }
    // MediaPipe 手势处理
    function initMediaPipe() {
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        hands.onResults(results => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusLabel.innerText = "Hand Detected - Controlling...";
                const landmarks = results.multiHandLandmarks[0];
                // 计算食指尖和拇指尖的欧几里得距离来判断张合
                const thumb = landmarks[4];
                const index = landmarks[8];
                const dist = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));
                // 映射：捏合(dist小) -> 缩小；张开(dist大) -> 放大并爆炸
                let targetScale = THREE.MathUtils.mapLinear(dist, 0.05, 0.4, 0.5, 5.5);
                handScale += (targetScale - handScale) * 0.1; // 平滑平滑
            } else {
                statusLabel.innerText = "Waiting for hand...";
                handScale += (1.0 - handScale) * 0.05; // 自动回缩
            }
        });
        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();
    }
    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now() * 0.001;
        particles.material.uniforms.uTime.value = time;
        particles.material.uniforms.uScale.value = handScale;
        // 缓慢旋转相机增加动感
        scene.rotation.y = time * 0.05;
        renderer.render(scene, camera);
    }
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else if (document.exitFullscreen) {
            document.exitFullscreen();
        }
    }
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    initThree();
    initMediaPipe();
    animate();
</script>
</body>
</html>
