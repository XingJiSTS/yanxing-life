<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>衍星Life</title>
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 防止移动端点击出现蓝色高亮框 */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f7f9fc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #342a2a;
            position: relative;
            overflow: hidden; /* 防止轨迹溢出 */
            touch-action: none; /* 优化移动端触摸，防止拖动时页面刷新 */
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 600px; /* 限制大屏下的最大宽度 */
            position: relative; 
            z-index: 10;
        }

        h1 {
            font-size: clamp(24px, 8vw, 60px); /* 响应式字体：最小24，随屏变，最大60 */
            margin-bottom: 2vh;
            font-weight: 600;
        }

        .emoji {
            font-size: clamp(80px, 30vw, 160px);
            color: #7d8797;
            margin-bottom: 20px;
            line-height: 1.2;
            cursor: pointer;
            transition: transform 0.2s, color 0.3s;
            user-select: none;
        }

        .emoji:hover {
            transform: scale(1.1);
        }

        .btn {
            font-weight: 500;
            display: block;
            border: 3px solid #342a2a; /* 缩小了边框厚度更精致 */
            color: #342a2a;
            margin: 12px auto;
            background-color: #ffffff;
            text-decoration: none;
            font-size: 24px; /* 默认手机端字体大小 */
            padding: 12px 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            width: 85%; /* 手机端按钮加宽，方便点击 */
            max-width: 400px;
        }

        /* 平板和电脑端适配 */
        @media (min-width: 768px) {
            .btn {
                font-size: 32px;
                width: 60%;
                border-width: 5px;
            }
            .emoji { margin-bottom: 30px; }
        }

        /* 电脑大屏适配 */
        @media (min-width: 1024px) {
            .btn {
                font-size: 36px;
                width: 50%;
            }
        }

        .btn:active {
            transform: scale(0.95);
            background-color: #f0f0f0;
        }

        /* 轨迹样式 */
        .emoji-trail {
            position: absolute;
            font-size: 30px;
            pointer-events: none;
            z-index: 5;
            animation: trail-fade .6s ease-out forwards;
        }

        @keyframes trail-fade {
            0% { opacity: 1; transform: translate(0, 0) scale(0.7); }
            100% { opacity: 0; transform: translate(0, -40px) rotate(30deg) scale(0.2); }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>衍星Life</h1>
        <p class="emoji">🥰</p>
        
        <a href="randomNumber.html" class="btn">随机数生成器</a>
        <a href="controller.html" class="btn">操控衍星</a>
        <a href="suchas.html" class="btn">个人档案</a>
        <a href="starsky.html" class="btn">土星</a>
        <a href="starsky2.html" class="btn">Gemini星空</a>
    </div>

    <script>
        let isDrawing = false;
        const emojiElement = document.querySelector('.emoji');
        const emojiText = emojiElement.textContent.trim();

        // 切换状态
        const toggleDrawing = (e) => {
            e.stopPropagation();
            isDrawing = !isDrawing;
            emojiElement.style.color = isDrawing ? '#ff6b9d' : '#7d8797';
            emojiElement.style.transform = isDrawing ? 'scale(1.1)' : 'scale(1)';
        };

        emojiElement.addEventListener('click', toggleDrawing);
        // 针对触摸屏的点击优化
        emojiElement.addEventListener('touchstart', (e) => {
            // 防止触发模拟鼠标点击
        });

        // 通用创建轨迹函数
        function createTrail(x, y) {
            if (!isDrawing) return;

            const trailEmoji = document.createElement('span');
            trailEmoji.className = 'emoji-trail';
            trailEmoji.textContent = emojiText;
            trailEmoji.style.left = `${x - 15}px`;
            trailEmoji.style.top = `${y - 15}px`;

            document.body.appendChild(trailEmoji);
            setTimeout(() => trailEmoji.remove(), 600);
        }

        // 鼠标移动监听
        window.addEventListener('mousemove', (e) => {
            createTrail(e.clientX, e.clientY);
        });

        // 触摸移动监听 (适配手机/平板)
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            createTrail(touch.clientX, touch.clientY);
        }, { passive: true });

        // 点击空白关闭
        window.addEventListener('click', (e) => {
            if (e.target !== emojiElement && isDrawing) {
                isDrawing = false;
                emojiElement.style.color = '#7d8797';
                emojiElement.style.transform = 'scale(1)';
            }
        });
    </script>
</body>
</html>
