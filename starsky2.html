<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Starsky v10 — Saturn Gesture System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#info{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:14px;
opacity:.7;
line-height:1.5;
}

video{
display:none;
}
</style>
</head>

<body>

<div id="info">
Starsky v10<br>
move hand → rotate<br>
pinch → zoom<br>
spread fingers → ring<br>
fist → grab spin<br>
open hand → storm
</div>

<video class="input_video"></video>

<script>

/* =========================
   THREE.JS WORLD
========================= */

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
10000
)

camera.position.z = 120

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

/* =========================
   SATURN
========================= */

let group = new THREE.Group()
scene.add(group)

let saturnGeo = new THREE.SphereGeometry(18,128,128)

let saturnMat = new THREE.MeshStandardMaterial({

color:0xd8c28c,
roughness:.9,
metalness:.05

})

let saturn = new THREE.Mesh(saturnGeo,saturnMat)
group.add(saturn)

/* =========================
   RINGS
========================= */

let ringGeo = new THREE.BufferGeometry()

let ringCount = 12000
let ringPos = new Float32Array(ringCount*3)

for(let i=0;i<ringCount;i++){

let r = 28 + Math.random()*22
let a = Math.random()*Math.PI*2

ringPos[i*3]   = Math.cos(a)*r
ringPos[i*3+1] = (Math.random()-.5)*.5
ringPos[i*3+2] = Math.sin(a)*r

}

ringGeo.setAttribute("position",new THREE.BufferAttribute(ringPos,3))

let ringMat = new THREE.PointsMaterial({

color:0xe8d6aa,
size:.4

})

let ring = new THREE.Points(ringGeo,ringMat)
group.add(ring)

/* =========================
   STARS
========================= */

let starGeo = new THREE.BufferGeometry()

let starCount = 50000
let starPos = new Float32Array(starCount*3)

for(let i=0;i<starCount;i++){

let r = 1500*Math.random()

let theta = Math.random()*Math.PI*2
let phi = Math.random()*Math.PI

starPos[i*3]   = r*Math.sin(phi)*Math.cos(theta)
starPos[i*3+1] = r*Math.sin(phi)*Math.sin(theta)
starPos[i*3+2] = r*Math.cos(phi)

}

starGeo.setAttribute("position",new THREE.BufferAttribute(starPos,3))

let starMat = new THREE.PointsMaterial({

size:1.3,
color:0xffffff

})

let stars = new THREE.Points(starGeo,starMat)
scene.add(stars)

/* =========================
   LIGHT
========================= */

let sun = new THREE.PointLight(0xffffff,1.3)
sun.position.set(200,200,200)

scene.add(sun)

scene.add(new THREE.AmbientLight(0x222222))

/* =========================
   PHYSICS
========================= */

let rotX=0
let rotY=0

let velX=0
let velY=0

let scale=1
let targetScale=1

let ringWidth=1

let chaos=0

/* =========================
   RENDER LOOP
========================= */

function animate(){

requestAnimationFrame(animate)

/* inertia */

rotX += velX
rotY += velY

velX *= .95
velY *= .95

group.rotation.x = rotX
group.rotation.y = rotY

scale += (targetScale-scale)*.08
group.scale.set(scale,scale,scale)

ring.scale.set(ringWidth,1,ringWidth)

saturn.material.emissiveIntensity = chaos

chaos *= .92

renderer.render(scene,camera)

}

animate()

/* =========================
   HAND TRACKING
========================= */

const videoElement=document.querySelector(".input_video")

const hands=new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}
})

hands.setOptions({

maxNumHands:2,
modelComplexity:1,
minDetectionConfidence:.7,
minTrackingConfidence:.7

})

/* =========================
   GESTURE HELPERS
========================= */

function dist(a,b){

return Math.sqrt(
(a.x-b.x)**2+
(a.y-b.y)**2
)

}

function isFist(h){

return h[8].y>h[6].y &&
h[12].y>h[10].y &&
h[16].y>h[14].y

}

function isOpen(h){

return h[8].y<h[6].y &&
h[12].y<h[10].y &&
h[16].y<h[14].y &&
h[20].y<h[18].y

}

/* =========================
   HAND CONTROL
========================= */

let lastX=0
let lastY=0

hands.onResults(results=>{

if(!results.multiHandLandmarks) return

let h = results.multiHandLandmarks[0]

let palm = h[9]

/* rotation */

let dx = palm.x - lastX
let dy = palm.y - lastY

velY += dx*4
velX += dy*4

/* pinch zoom */

let pinch = dist(h[4],h[8])
targetScale = .5 + pinch*6

/* ring control */

let spread = Math.abs(h[8].x - h[12].x)
ringWidth = 1 + spread*3

/* depth zoom */

targetScale += palm.z*3

/* grab boost */

if(isFist(h)){

velY += dx*15
velX += dy*15

}

/* storm */

if(isOpen(h)){

chaos = 1.5

}

lastX = palm.x
lastY = palm.y

})

/* =========================
   CAMERA
========================= */

const cam=new Camera(videoElement,{

onFrame:async()=>{

await hands.send({image:videoElement})

},

width:640,
height:480

})

cam.start()

</script>

</body>
</html>
